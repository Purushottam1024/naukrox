name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint:
    name: Lint & Style Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install lint tools
        run: pip install flake8 black

      - name: Run flake8
        run: flake8 app/ run.py --max-line-length=120 --ignore=E501,W503

      - name: Check Black formatting
        run: black --check app/ run.py

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create dummy .env
        run: |
          echo "OPENAI_API_KEY=sk-dummy" > .env
          echo "MONGO_URI=mongodb://mongo:27017/" >> .env
          echo "FLASK_SECRET_KEY=test-secret" >> .env

      - name: Build Docker image
        run: docker build -t naukrox:test .

      - name: Verify image built
        run: docker images naukrox:test
